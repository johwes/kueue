---
apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha
  labels:
    team: alpha
    kueue.openshift.io/managed: "true"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: team-alpha-queue
  namespace: team-alpha
spec:
  # Reference to the ClusterQueue this LocalQueue maps to
  clusterQueue: cluster-total
