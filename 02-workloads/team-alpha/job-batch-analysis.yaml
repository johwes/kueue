---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-batch-analysis
  namespace: team-alpha
  labels:
    kueue.x-k8s.io/queue-name: team-alpha-queue
    app: batch-analysis
spec:
  template:
    metadata:
      labels:
        app: batch-analysis
    spec:
      containers:
      - name: worker
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sh", "-c"]
        args:
        - |
          echo "=========================================="
          echo "Batch Analysis Job - Team Alpha"
          echo "=========================================="
          echo "Job: $HOSTNAME"
          echo "Started: $(date)"
          echo ""
          echo "Analyzing dataset..."
          sleep 25
          echo "Generating report..."
          sleep 15
          echo ""
          echo "Analysis complete!"
          echo "Completed: $(date)"
          echo "=========================================="
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
      restartPolicy: Never
  backoffLimit: 2
