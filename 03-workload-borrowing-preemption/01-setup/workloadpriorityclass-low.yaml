---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: low-priority
# Priority value: lower number = lower priority
value: 100

# Description explains when to use this priority
description: "Low priority for training experiments that can be interrupted and resumed. Use for best-effort workloads that tolerate preemption."

