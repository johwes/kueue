---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: inference-cluster-queue
spec:
  # Cohort: Same resource-sharing club as training
  # Inference can borrow idle resources from training-cluster-queue
  cohort: ml-shared-pool

  # Namespace selector: which namespaces can use this queue
  namespaceSelector: {}  # Any namespace with proper LocalQueue

  # Queueing strategy
  queueingStrategy: BestEffortFIFO

  # Preemption policies
  preemption:
    # Can reclaim borrowed resources from other queues in cohort
    # This is critical for production SLAs - inference can evict training
    reclaimWithinCohort: Any

    # Borrowing policy within cohort
    borrowWithinCohort:
      policy: Never  # Conservative: only use truly idle resources

    # Within this queue, higher priority workloads can preempt lower priority
    withinClusterQueue: LowerPriority

  # Resource groups define what this queue manages
  resourceGroups:
  - coveredResources: ["cpu", "memory"]
    flavors:
    - name: default-flavor
      resources:
      # Nominal quota: guaranteed resources for this queue
      - name: "cpu"
        nominalQuota: 2        # Inference team's guaranteed quota

      - name: "memory"
        nominalQuota: 256Mi    # Minimal for cost efficiency

      # Note: With cohort, inference can borrow up to 3 additional CPUs
      # from training-cluster-queue when idle (max 5 CPUs total)
